schema: spec-driven

# 项目上下文（可选）
# 在创建工件时向 AI 显示此信息。
# 添加您的技术栈、约定、风格指南、领域知识等。
# 示例：
context: |
  技术栈：Python
  约定：PEP 8、类型注解、安全禁则
  风格指南：.codebuddy/rules/python/
# 每个工件的规则（可选）
# 为特定工件添加自定义规则。这些规则会在对应阶段被 OpenSpec 注入到 AI 约束中。
rules:
  tasks:    
    - "所有 Python 代码必须遵循 .codebuddy/rules/python/ 下的编码规范（PEP 8、类型注解、安全禁则）"
    - "保持每次代码变更最小化，聚焦当前任务范围，不引入无关重构"
    - "强制：完成一组任务（最多 5 个）后必须自动 review 代码质量：检查死参数、未使用 import、硬编码假值、缺 import。发现问题立即修复，不等到全部任务完成。"
    - "强制：每个脚本的验证标准：(1) 所有 argparse 参数必须在代码中实际使用或出现在 results.json 中 (2) 所有 import 必须被调用 (3) ASR/FID 等指标必须通过 compute_xxx 函数计算，不得硬编码。"
    - "强制：任何涉及 CLI 参数新增、删除、修改或方法增删的代码变更，必须在同一变更中同步更新 USAGE.md 的对应参数表和命令示例。USAGE.md 更新视为 apply 阶段必须通过的验证门禁之一。"
  proposal:
    - "保持提案聚焦单一变更目标，不捆绑多个无关功能"
    - "必须在提案中明确列出变更的动机、范围和非目标"
    - "强制：提案中不得使用建议性、不确定的描述（如'建议''可以''可能''或许'）。所有写入提案的内容必须是确认要做的、可验证的决定。如果某个决策不确定，不要在提案中写它——先探索确认，再写进提案。"
    - "强制：如果提案的任务数超过 20 个，必须自动拆分为多个子提案，每个子提案独立完成、独立验证、独立归档。禁止为了赶进度而应付性地批量生成代码。每个子提案的 apply 完成后必须 review，确认通过才能开始下一个子提案。子提案命名规范：<原提案名>-part<N>。"
    - "强制：提案中的每个任务必须有明确的完成标准（如'参数在 results.json 中出现''所有 import 被使用''ASR 通过 compute_asr 计算而非硬编码'），禁止模糊任务（如'实现 A-01'）。"
    - "全局强制：在任何 OpenSpec 阶段（propose/design/tasks/apply/archive/explore），如果遇到信息不足、需求模糊、无法确定的情况，必须主动向用户反馈并请求澄清，禁止猜测或想当然地自行决定。宁可暂停等待，不可编造。"
  design:
    - "设计阶段禁止修改任何源代码文件"
    - "设计文档应包含架构决策、数据流图和关键接口定义"
    - "涉及新的攻击/防御模块时，必须说明继承架构和注册方式"
    - "强制：设计文档中如果包含分阶段实施计划（如 Phase 1/2/3），每个阶段必须定义明确的验证门禁条件。进入下一阶段前必须先通过当前阶段的所有门禁。禁止跳过验证阶段。"
  apply:
    - "强制：实施过程中必须严格遵循设计文档中定义的分阶段顺序。如果设计写了 Phase 3 是骨架验证，则 Phase 3 完成后必须停下来校验骨架代码，确认通过后才能进入 Phase 4。禁止跳过任何阶段。"
    - "强制：每完成 5 个以下的任务（或一个逻辑组），必须运行验证：语法检查 + 参数使用检查 + import 完整性检查。发现任何问题立即在当前 apply session 内修复，不留到下一次。"
    - "强制：禁止为了加快速度而批量生成模板代码。每个方法必须实现其设计文档中描述的独特攻击/防御机制。复制粘贴相同逻辑到多个文件、仅修改 MID 字符串，属于违规。"
    - "强制：完成代码实现后必须进行全量的test,保证新修改代码无问题且修改不影响原先的逻辑验证无误后才能标志着任务的完成。"
